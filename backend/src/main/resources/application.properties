# CRUXTRACK: APPLICATION NAME SHOWN IN LOGS
spring.application.name=backend

# CRUXTRACK: SQLITE DATABASE FILE PATH (RELATIVE TO WHERE YOU RUN THE JAR/MVN FROM — USE THE /BACKEND FOLDER)
# CRUXTRACK: FIRST RUN CREATES DATABASE/CRUXTRACK.DB AUTOMATICALLY
spring.datasource.url=jdbc:sqlite:database/cruxtrack.db
# CRUXTRACK: TELLS JAVA WHICH DRIVER LOADS SQLITE
spring.datasource.driver-class-name=org.sqlite.JDBC

# CRUXTRACK: HIBERNATE NEEDS A "DIALECT" SO IT BUILDS CORRECT SQL FOR SQLITE
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# CRUXTRACK: UPDATE = CREATE OR ALTER TABLES TO MATCH YOUR JAVA ENTITIES (GOOD FOR DEVELOPMENT)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CRUXTRACK: BACKEND LISTENS HERE; ANGULAR DEV SERVER USES 4200 AND PROXIES /API TO THIS PORT
server.port=8080

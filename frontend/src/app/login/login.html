<main class="page">
  <section class="login-card">
    <header class="login-header">
      <h1 class="login-brand">CruxTrack</h1>
      <p class="login-subtitle">Admin Login</p>
      <p class="hint">Use the built-in credentials to sign in.</p>
    </header>

    <form class="login-form" (ngSubmit)="onSubmit()" aria-label="Admin login form">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
        placeholder="Enter username"
        autocomplete="username"
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        placeholder="Enter password"
        autocomplete="current-password"
      />

      <button class="login-button" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    @if (errorMessage()) {
      <p class="error-message" role="alert">{{ errorMessage() }}</p>
    }

    @if (successMessage()) {
      <p class="success-message">{{ successMessage() }}</p>
    }

    <p class="credentials">Built-in credentials: <strong>Admin</strong> / admin123 or <strong>User</strong> / user123</p>
  </section>
</main>
